server:
  port: 8080
  read_timeout: 30s
  write_timeout: 120s

providers:
  google:
    api_key: ${GOOGLE_API_KEY}
    base_url: https://generativelanguage.googleapis.com/v1beta
    models:
      - gemini-2.5-pro
      - gemini-2.5-flash
      - gemini-2.0-flash
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    base_url: https://api.anthropic.com/v1
    models:
      - claude-sonnet-4-5-20250929
      - claude-haiku-4-5-20251001

cache:
  redis_url: redis://localhost:6379/0
  similarity_threshold: 0.92
  ttl: 1h
  max_entries: 50000

embedding:
  model_path: ./models/model.onnx
  tokenizer_path: ./models/tokenizer.json
  library_path: ./lib/libonnxruntime.dylib
  dimension: 384

costs:
  gemini-2.5-pro:
    input_per_million: 1.25
    output_per_million: 10.00
  gemini-2.5-flash:
    input_per_million: 0.30
    output_per_million: 2.50
  gemini-2.0-flash:
    input_per_million: 0.10
    output_per_million: 0.40
  claude-sonnet-4-5-20250929:
    input_per_million: 3.00
    output_per_million: 15.00
  claude-haiku-4-5-20251001:
    input_per_million: 1.00
    output_per_million: 5.00

routing:
  default_strategy: auto
  default_provider: anthropic
  complexity_threshold: 0.28
  classifier_model_path: ./models/complexity_classifier.onnx
  providers:
    google:
      cheap_model: gemini-2.0-flash
      quality_model: gemini-2.5-pro
    anthropic:
      cheap_model: claude-haiku-4-5-20251001
      quality_model: claude-sonnet-4-5-20250929
